spec_version: 1
name: meta_hackaoth_support_ticket_v1
type: space
runtime: fastapi
app: server.app:app
port: 7860

tasks:
  - id: easy_password_reset
    task_id: easy_password_reset
    grader: support_env.task_graders.grade_password_reset_task

  - id: medium_billing_missing_info
    task_id: medium_billing_missing_info
