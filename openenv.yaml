graders:
  easy_password_reset: support_env.task_graders.grade_password_reset_task
  medium_billing_missing_info: support_env.task_graders.grade_billing_task
  hard_technical_troubleshooting: support_env.task_graders.grade_technical_task

environment:
  id: meta_hackaoth_support_ticket_v1
  entry_point:
    module: support_env.environment
    class: SupportTicketEnvironment